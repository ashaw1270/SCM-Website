<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spice City Music | Home</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="header-brand" href="index.html" aria-label="Spice City Music home">
          <img
            class="header-mark"
            src="SCM Letters Transparent.png"
            alt="Spice City Music"
          />
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="nav-link active" href="index.html">Home</a>
          <a class="nav-link" href="about.html">About</a>
          <a class="nav-link" href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <section class="hero">
        <h1>Spice City Music</h1>
        <p class="lead">Open for business for Summer 2026.</p>
        <p>
          We bring high-energy DJ entertainment for weddings, private parties,
          and events. Reach out now to reserve your date.
        </p>
        <a class="cta-button" href="contact.html">Book Us</a>
      </section>

      <section class="video-section" aria-labelledby="promo-video-title">
        <h2 id="promo-video-title">Watch Our Promo</h2>
        <p>Get a quick feel for the Spice City Music experience.</p>
        <div class="video-frame">
          <video controls preload="metadata" poster="logo.png">
            <source src="promo.mov" type="video/quicktime" />
            Your browser does not support the video tag.
          </video>
        </div>
      </section>
    </main>
  </body>
</html>
