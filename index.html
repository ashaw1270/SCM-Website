<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spice City Music</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="home-page">
    <header class="site-header">
      <div class="site-header-inner">
        <a class="header-brand" href="index.html" aria-label="Spice City Music home">
          <img
            class="header-mark"
            src="SCM Letters Transparent.png"
            alt="Spice City Music"
          />
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="nav-link active" href="index.html">Home</a>
          <a class="nav-link" href="about.html">About</a>
          <a class="nav-link" href="book-us.html">Book Us</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <section class="hero" id="heroSection">
        <h1 class="hero-title">
          <img
            class="hero-title-img"
            src="SCM Letters Transparent.png"
            alt="Spice City Music"
          />
        </h1>
        <p class="lead">We are back for Summer 2026!</p>
        <p class="hero-copy">
          Limited availability May–August. Reach out now to reserve your date.
        </p>
        <div class="hero-actions">
          <a class="cta-button" href="book-us.html">Book Us</a>
        </div>
      </section>

      <section class="video-section" id="promoSection" aria-labelledby="promo-video-title">
        <h2 id="promo-video-title">Watch Our Promo</h2>
        <p>Get a quick feel for the Spice City Music experience.</p>
        <div class="video-frame">
          <video id="promoVideo" controls preload="metadata" poster="logo.png" muted playsinline>
            <source src="promo.mp4" type="video/mp4" />
            <source src="promo.mov" type="video/quicktime" />
            Your browser does not support the video tag.
          </video>
        </div>
      </section>
    </main>
    <script>
      (function () {
        const body = document.body;
        const promoSection = document.getElementById("promoSection");
        const promoVideo = document.getElementById("promoVideo");
        const videoFrame = document.querySelector(".video-frame");

        if (!promoSection || !promoVideo || !videoFrame) return;

        let immersiveActive = false;
        let flipEndHandler = null;

        const enterTop = 140;
        const exitTop = 260;

        const prefersReducedMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)"
        ).matches;

        const FLIP_MS = 680;
        const FLIP_EASE = "cubic-bezier(0.22, 1, 0.36, 1)";

        const endFlipListener = () => {
          if (flipEndHandler) {
            videoFrame.removeEventListener("transitionend", flipEndHandler);
            flipEndHandler = null;
          }
        };

        const tryPlay = () => {
          promoVideo.muted = true;
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              const p = promoVideo.play();
              if (p && typeof p.catch === "function") {
                p.catch(() => {});
              }
            });
          });
        };

        const clearFlipStyles = () => {
          videoFrame.style.transition = "";
          videoFrame.style.transform = "";
          videoFrame.style.transformOrigin = "";
          videoFrame.style.willChange = "";
        };

        const enterImmersive = () => {
          if (prefersReducedMotion) {
            body.classList.add("video-immersive");
            immersiveActive = true;
            tryPlay();
            return;
          }

          endFlipListener();
          const before = videoFrame.getBoundingClientRect();
          body.classList.add("video-immersive");
          immersiveActive = true;
          void videoFrame.offsetWidth;
          const after = videoFrame.getBoundingClientRect();

          if (
            after.width < 2 ||
            after.height < 2 ||
            before.width < 2 ||
            before.height < 2
          ) {
            clearFlipStyles();
            tryPlay();
            return;
          }

          const dx = before.left - after.left;
          const dy = before.top - after.top;
          const sx = before.width / after.width;
          const sy = before.height / after.height;

          videoFrame.style.transformOrigin = "top left";
          videoFrame.style.willChange = "transform";
          videoFrame.style.transition = "none";
          videoFrame.style.transform =
            "translate(" + dx + "px, " + dy + "px) scale(" + sx + ", " + sy + ")";

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              videoFrame.style.transition =
                "transform " + FLIP_MS + "ms " + FLIP_EASE;
              videoFrame.style.transform = "translate(0, 0) scale(1, 1)";
            });
          });

          tryPlay();

          const onEnd = (e) => {
            if (e.propertyName !== "transform") return;
            endFlipListener();
            clearFlipStyles();
          };
          flipEndHandler = onEnd;
          videoFrame.addEventListener("transitionend", onEnd);
        };

        const exitImmersive = () => {
          if (prefersReducedMotion) {
            body.classList.remove("video-immersive");
            immersiveActive = false;
            return;
          }

          endFlipListener();
          const before = videoFrame.getBoundingClientRect();
          body.classList.remove("video-immersive");
          immersiveActive = false;
          void videoFrame.offsetWidth;
          const after = videoFrame.getBoundingClientRect();

          if (
            after.width < 2 ||
            after.height < 2 ||
            before.width < 2 ||
            before.height < 2
          ) {
            clearFlipStyles();
            return;
          }

          const dx = before.left - after.left;
          const dy = before.top - after.top;
          const sx = before.width / after.width;
          const sy = before.height / after.height;

          videoFrame.style.transformOrigin = "top left";
          videoFrame.style.willChange = "transform";
          videoFrame.style.transition = "none";
          videoFrame.style.transform =
            "translate(" + dx + "px, " + dy + "px) scale(" + sx + ", " + sy + ")";

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              videoFrame.style.transition =
                "transform " + FLIP_MS + "ms " + FLIP_EASE;
              videoFrame.style.transform = "translate(0, 0) scale(1, 1)";
            });
          });

          const onEnd = (e) => {
            if (e.propertyName !== "transform") return;
            endFlipListener();
            clearFlipStyles();
          };
          flipEndHandler = onEnd;
          videoFrame.addEventListener("transitionend", onEnd);
        };

        const setImmersiveMode = (shouldEnable) => {
          if (shouldEnable === immersiveActive) return;
          if (shouldEnable) enterImmersive();
          else exitImmersive();
        };

        const updateImmersiveState = () => {
          const top = promoSection.getBoundingClientRect().top;
          if (!immersiveActive && top <= enterTop) {
            setImmersiveMode(true);
          } else if (immersiveActive && top > exitTop) {
            setImmersiveMode(false);
          }
        };

        window.addEventListener("scroll", updateImmersiveState, {
          passive: true,
        });
        window.addEventListener("resize", updateImmersiveState);
        updateImmersiveState();
      })();
    </script>
  </body>
</html>
