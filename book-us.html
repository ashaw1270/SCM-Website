<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spice City Music | Book Us</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="header-brand" href="index.html" aria-label="Spice City Music home">
          <img
            class="header-mark"
            src="SCM Letters Transparent.png"
            alt="Spice City Music"
          />
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="about.html">About</a>
          <a class="nav-link active" href="book-us.html">Book Us</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <section class="content-card">
        <h1>Let's Connect</h1>
        <p class="tell-us">
          Tell us about your event and we will get back to you as soon as
          possible.
        </p>

        <form
          class="booking-form"
          action="https://formsubmit.co/ryanandadam@spicecitymusic.com"
          method="POST"
        >
          <input type="hidden" name="_subject" value="New Booking Inquiry - Spice City Music" />
          <input type="hidden" name="_captcha" value="false" />
          <input type="text" name="_honey" style="display: none" tabindex="-1" autocomplete="off" />

          <div class="form-row form-row-split">
            <div class="form-field-group">
              <label for="firstName">First Name</label>
              <input
                id="firstName"
                name="firstName"
                type="text"
                required
                autocomplete="given-name"
              />
            </div>
            <div class="form-field-group">
              <label for="lastName">Last Name</label>
              <input
                id="lastName"
                name="lastName"
                type="text"
                required
                autocomplete="family-name"
              />
            </div>
          </div>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>

          <button type="submit">Send Inquiry</button>
        </form>
      </section>
    </main>
  </body>
</html>
