<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spice City Music | Book Us</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="header-brand" href="index.html" aria-label="Spice City Music home">
          <img
            class="header-mark"
            src="SCM Letters Transparent.png"
            alt="Spice City Music"
          />
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="about.html">About</a>
          <a class="nav-link active" href="book-us.html">Book Us</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <section class="content-card">
        <h1>Let's Connect</h1>
        <p class="tell-us">
          Tell us about your event and we will get back to you as soon as
          possible.
        </p>

        <form
          class="booking-form"
          action="https://formspree.io/f/xkoywdwo"
          method="POST"
        >
          <input type="hidden" name="_subject" value="New Booking Inquiry - Spice City Music" />
          <input type="hidden" name="_next" id="book-formspree-next" value="" />
          <input type="text" name="_gotcha" style="display: none" tabindex="-1" autocomplete="off" />

          <div class="form-row form-row-split">
            <div class="form-field-group">
              <label for="firstName">First Name</label>
              <input
                id="firstName"
                name="firstName"
                type="text"
                required
                autocomplete="given-name"
              />
            </div>
            <div class="form-field-group">
              <label for="lastName">Last Name</label>
              <input
                id="lastName"
                name="lastName"
                type="text"
                required
                autocomplete="family-name"
              />
            </div>
          </div>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>

          <button type="submit">Send Inquiry</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <nav class="footer-social" aria-label="Contact and social links">
        <a
          class="footer-link"
          href="tel:+18479032952"
          aria-label="Call (847) 903-2952"
        >
          (847) 903-2952
        </a>
        <span class="footer-sep" aria-hidden="true">·</span>
        <a
          class="footer-link"
          href="mailto:ryanandadam@spicecitymusic.com"
          aria-label="Email ryanandadam@spicecitymusic.com"
        >
          ryanandadam@spicecitymusic.com
        </a>
        <span class="footer-sep" aria-hidden="true">·</span>
        <a
          class="footer-link"
          href="https://www.instagram.com/spicecitymusic/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Spice City Music on Instagram (@spicecitymusic)"
        >
          Instagram: @spicecitymusic
        </a>
        <span class="footer-sep" aria-hidden="true">·</span>
        <a
          class="footer-link"
          href="https://www.facebook.com/SpiceCityDJ"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Spice City Music on Facebook (@SpiceCityDJ)"
        >
          Facebook: @SpiceCityDJ
        </a>
      </nav>
    </footer>

    <dialog
      id="book-thank-you-dialog"
      class="thank-you-dialog"
      aria-labelledby="book-thank-you-dialog-title"
    >
      <div class="thank-you-dialog-inner">
        <h2 id="book-thank-you-dialog-title">Thank you!</h2>
        <p class="thank-you-dialog-copy">
          Your inquiry has been sent. We will get back to you as soon as we can.
        </p>
        <form method="dialog">
          <button type="submit" class="cta-button thank-you-dialog-close">Close</button>
        </form>
      </div>
    </dialog>

    <script>
      (function () {
        const nextEl = document.getElementById("book-formspree-next");
        if (nextEl) {
          try {
            const u = new URL(window.location.href);
            u.search = "?thanks=1";
            nextEl.value = u.toString();
          } catch (e) {
            nextEl.value =
              window.location.origin + window.location.pathname + "?thanks=1";
          }
        }
      })();
    </script>
    <script>
      (function () {
        const dlg = document.getElementById("book-thank-you-dialog");
        if (!dlg) return;
        function goToHero() {
          window.location.href = "index.html";
        }
        dlg.addEventListener("close", goToHero);
        var params = new URLSearchParams(window.location.search);
        if (params.get("thanks") !== "1") return;
        if (typeof dlg.showModal === "function") {
          dlg.showModal();
        } else {
          window.alert(
            "Thank you! Your inquiry has been sent. We will get back to you as soon as we can."
          );
          goToHero();
        }
        try {
          var u = new URL(window.location.href);
          u.search = "";
          history.replaceState({}, "", u.toString());
        } catch (err) {
          /* ignore */
        }
      })();
    </script>
  </body>
</html>
